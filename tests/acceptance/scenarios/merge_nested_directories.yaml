# Scenario: Merging rules from nested directories
# Tests that patterns are correctly prefixed when merging from subdirectories

description: "Patterns are prefixed with their directory path when merged"

tree:
  .lore.json:
    root-fact:
      fact: "Root level patterns"
      incl: ["p:*.md", "p:*.txt"]

  src:
    .lore.json:
      src-fact:
        fact: "Source patterns"
        incl: ["p:**/*.js"]
        skip: ["p:vendor/**"]

    api:
      .lore.json:
        api-fact:
          fact: "API patterns"
          incl: ["p:*.ts"]

expected_merged:
  root-fact:
    incl: ["p:*.md", "p:*.txt"]

  src-fact:
    incl: ["p:src/**/*.js"]
    skip: ["p:src/vendor/**"]

  api-fact:
    incl: ["p:src/api/*.ts"]
