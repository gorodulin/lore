# Scenario: Duplicate matcher detection
# Tests that duplicate matchers are identified within facts

description: "Detect duplicate matchers within and across incl/skip"

rules:
  dup-in-incl:
    fact: "Has duplicate in incl"
    incl:
      - "p:**/*.js"
      - "p:**/*.ts"
      - "p:**/*.js"  # duplicate

  dup-across:
    fact: "Same matcher in incl and skip"
    incl:
      - "p:**/*.js"
    skip:
      - "p:**/*.js"  # same as incl

  no-dups:
    fact: "Clean fact with no duplicates"
    incl:
      - "p:**/*.py"
    skip:
      - "p:vendor/**"

expected_warnings:
  duplicates:
    dup-in-incl:
      - "p:**/*.js"
    dup-across:
      - "p:**/*.js"
