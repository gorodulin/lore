# Scenario: Mixed file/folder target detection
# Tests that facts mixing file and folder globs are identified

description: "Detect facts that mix file-targeting and folder-targeting globs"

rules:
  mixed-targets:
    fact: "Mixes files and directories"
    incl:
      - "p:**/*.js"  # targets files
      - "p:src/"     # targets directory

  files-only:
    fact: "Only targets files"
    incl:
      - "p:**/*.js"
      - "p:**/*.ts"

  dirs-only:
    fact: "Only targets directories"
    incl:
      - "p:src/"
      - "p:lib/"

  mixed-in-skip:
    fact: "Mixed in skip"
    incl:
      - "p:**/*.js"
    skip:
      - "p:vendor/"  # dir in skip while incl targets files

expected_warnings:
  mixed_targets:
    - mixed-targets
    - mixed-in-skip
