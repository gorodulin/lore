# Scenario: Non-glob matchers are not prefixed
# Tests that regex and string matchers are preserved unchanged during merge

description: "Non-glob matchers (r:, s:) are not prefixed during merge"

tree:
  src:
    .lore.json:
      mixed-matchers:
        fact: "Mix of matcher types"
        incl:
          - "p:**/*.js" # glob - will be prefixed
          - "c:.*\\.test\\.js$" # regex - unchanged
        skip:
          - "p:vendor/**" # glob - will be prefixed

expected_merged:
  mixed-matchers:
    incl:
      - "p:src/**/*.js"
      - "c:.*\\.test\\.js$"
    skip:
      - "p:src/vendor/**"
