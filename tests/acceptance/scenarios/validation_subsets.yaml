# Scenario: Subset pattern detection
# Tests that redundant subset patterns are identified

description: "Detect patterns that are subsets of other patterns in same fact"

rules:
  has-subset:
    fact: "Has subset pattern"
    incl:
      - "g:src/**/*.js"  # subset of **/*.js
      - "g:**/*.js"      # superset

  chain-subset:
    fact: "Chain of subsets"
    incl:
      - "g:src/api/**/*.js"  # most specific
      - "g:src/**/*.js"      # middle
      - "g:**/*.js"          # most general

  no-subset:
    fact: "No subset relationship"
    incl:
      - "g:**/*.js"
      - "g:**/*.ts"  # different extension, not a subset

expected_warnings:
  subsets:
    has-subset:
      - ["g:src/**/*.js", "g:**/*.js"]
    chain-subset:
      - ["g:src/api/**/*.js", "g:src/**/*.js"]
      - ["g:src/api/**/*.js", "g:**/*.js"]
      - ["g:src/**/*.js", "g:**/*.js"]
    no-subset: []
